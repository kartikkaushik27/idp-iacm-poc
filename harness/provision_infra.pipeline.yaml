pipeline:
  name: IDP IaCM Provision
  identifier: provision_infra
  projectIdentifier: IDP_POC
  orgIdentifier: default
  tags: {}
  variables:
    - name: workspace_id
      type: String
      description: Per-requester infra workspace id (<email>_infra), supplied by IDP
      required: true
      value: <+input>
    - name: requester_email
      type: String
      description: Email of the requesting developer
      required: true
      value: <+input>
    - name: requester_name
      type: String
      description: Display name of the requester
      required: false
      value: <+input>
    - name: create_ec2
      type: String
      description: "true to provision an EC2 instance, false to remove it"
      required: true
      value: <+input>
    - name: create_s3
      type: String
      description: "true to provision an S3 bucket, false to remove it"
      required: true
      value: <+input>
  stages:
    - stage:
        name: Bootstrap Workspace
        identifier: bootstrap
        description: Create the requester's IaCM workspace if it does not already exist (create-or-reuse). Runs on Harness Cloud, no delegate.
        type: CI
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Ensure Workspace
                  identifier: ensure_ws
                  timeout: 5m
                  spec:
                    shell: Sh
                    envVariables:
                      HARNESS_API_KEY: <+secrets.getValue("harness_api_key")>
                      ACCOUNT_ID: <+account.identifier>
                      WORKSPACE_ID: <+pipeline.variables.workspace_id>
                      CREATE_EC2: <+pipeline.variables.create_ec2>
                      CREATE_S3: <+pipeline.variables.create_s3>
                      OWNER_EMAIL: <+pipeline.variables.requester_email>
                      OWNER_NAME: <+pipeline.variables.requester_name>
                    command: |-
                      set -eu
                      BASE="https://app.harness.io/iacm/api/orgs/default/projects/IDP_POC/workspaces"

                      # Shared workspace body. AWS_SESSION_TOKEN is injected as a secret env var
                      # because the requester uses STS temporary credentials (the AWS connector
                      # only supplies the access key + secret, not the session token).
                      cat > /tmp/body.json <<JSON
                      {
                        "identifier": "${WORKSPACE_ID}",
                        "name": "${WORKSPACE_ID}",
                        "provisioner": "terraform",
                        "provisioner_version": "1.5.7",
                        "provider_connector": "aws_connector",
                        "repository_connector": "github_connector",
                        "repository": "idp-iacm-poc",
                        "repository_branch": "main",
                        "repository_path": ".",
                        "cost_estimation_enabled": false,
                        "environment_variables": {
                          "AWS_SESSION_TOKEN": {"key": "AWS_SESSION_TOKEN", "value": "AWS_SESSION_TOKEN", "value_type": "secret"}
                        },
                        "terraform_variables": {
                          "create_ec2": {"key": "create_ec2", "value": "${CREATE_EC2}", "value_type": "string"},
                          "create_s3": {"key": "create_s3", "value": "${CREATE_S3}", "value_type": "string"},
                          "owner_email": {"key": "owner_email", "value": "${OWNER_EMAIL}", "value_type": "string"},
                          "owner_name": {"key": "owner_name", "value": "${OWNER_NAME}", "value_type": "string"}
                        }
                      }
                      JSON

                      code=$(curl -s -o /tmp/ws.json -w "%{http_code}" \
                        -H "x-api-key: ${HARNESS_API_KEY}" \
                        "${BASE}/${WORKSPACE_ID}?accountIdentifier=${ACCOUNT_ID}")
                      echo "GET workspace status: ${code}"

                      if [ "${code}" = "200" ]; then
                        echo "Workspace ${WORKSPACE_ID} exists - updating (PUT) to keep vars/session token current..."
                        rcode=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X PUT \
                          -H "x-api-key: ${HARNESS_API_KEY}" \
                          -H "Content-Type: application/json" \
                          "${BASE}/${WORKSPACE_ID}?accountIdentifier=${ACCOUNT_ID}" \
                          -d @/tmp/body.json)
                      else
                        echo "Creating workspace ${WORKSPACE_ID}..."
                        rcode=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
                          -H "x-api-key: ${HARNESS_API_KEY}" \
                          -H "Content-Type: application/json" \
                          "${BASE}?accountIdentifier=${ACCOUNT_ID}" \
                          -d @/tmp/body.json)
                      fi
                      echo "Write workspace status: ${rcode}"
                      cat /tmp/resp.json || true
                      echo ""

                      if [ "${rcode}" != "200" ] && [ "${rcode}" != "201" ]; then
                        echo "Workspace write failed (HTTP ${rcode})"
                        exit 1
                      fi
                      echo "Workspace ${WORKSPACE_ID} ready."
        tags: {}
    - stage:
        name: Provision
        identifier: provision
        description: Run Terraform init/plan/apply against the workspace
        type: IACM
        spec:
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          workspace: <+pipeline.variables.workspace_id>
          execution:
            steps:
              - step:
                  type: IACMTerraformPlugin
                  name: init
                  identifier: init
                  timeout: 10m
                  spec:
                    command: init
              - step:
                  type: IACMTerraformPlugin
                  name: plan
                  identifier: plan
                  timeout: 10m
                  spec:
                    command: plan
              - step:
                  type: IACMTerraformPlugin
                  name: apply
                  identifier: apply
                  timeout: 30m
                  spec:
                    command: apply
        tags: {}
    - stage:
        name: Summary
        identifier: summary
        description: Fetch final workspace status. Runs on Harness Cloud, no delegate.
        type: CI
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Workspace Status
                  identifier: print_summary
                  timeout: 2m
                  spec:
                    shell: Sh
                    envVariables:
                      HARNESS_API_KEY: <+secrets.getValue("harness_api_key")>
                      ACCOUNT_ID: <+account.identifier>
                      WORKSPACE_ID: <+pipeline.variables.workspace_id>
                    command: |-
                      set -eu
                      BASE="https://app.harness.io/iacm/api/orgs/default/projects/IDP_POC/workspaces"
                      echo "Final status for workspace ${WORKSPACE_ID}:"
                      curl -s -H "x-api-key: ${HARNESS_API_KEY}" \
                        "${BASE}/${WORKSPACE_ID}?accountIdentifier=${ACCOUNT_ID}"
                      echo ""
              - step:
                  type: Run
                  name: Register Catalog Entity
                  identifier: register_catalog
                  timeout: 3m
                  spec:
                    shell: Sh
                    envVariables:
                      HARNESS_API_KEY: <+secrets.getValue("harness_api_key")>
                      ACCOUNT_ID: <+account.identifier>
                      WORKSPACE_ID: <+pipeline.variables.workspace_id>
                      CREATE_EC2: <+pipeline.variables.create_ec2>
                      CREATE_S3: <+pipeline.variables.create_s3>
                      OWNER_EMAIL: <+pipeline.variables.requester_email>
                      OWNER_NAME: <+pipeline.variables.requester_name>
                    command: |-
                      # Non-blocking: never fail provisioning because of catalog upkeep.
                      set -u
                      BASE="https://app.harness.io/v1/entities"
                      ID="${WORKSPACE_ID}"
                      ACCT="${ACCOUNT_ID}"

                      FORMDATA=$(printf '{"email":"%s","name":"%s","createEc2":%s,"createS3":%s}' "${OWNER_EMAIL}" "${OWNER_NAME}" "${CREATE_EC2}" "${CREATE_S3}")
                      ENC=$(printf '%s' "${FORMDATA}" | jq -sRr @uri)
                      MANAGE_URL="https://app.harness.io/ng/account/${ACCT}/module/idp/create/templates/default/order_infrastructure?formData=${ENC}"
                      WS_URL="https://app.harness.io/ng/account/${ACCT}/module/iacm/orgs/default/projects/IDP_POC/workspaces/${ID}"

                      {
                        echo "apiVersion: harness.io/v1"
                        echo "kind: Component"
                        echo "identifier: ${ID}"
                        echo "name: ${ID}"
                        echo "orgIdentifier: default"
                        echo "projectIdentifier: IDP_POC"
                        echo "type: infrastructure"
                        echo "owner: group:account/platform_team"
                        echo "spec:"
                        echo "  lifecycle: production"
                        echo "metadata:"
                        echo "  description: AWS infra managed via IDP for ${OWNER_EMAIL}"
                        echo "  links:"
                        echo "    - title: Manage / Edit Resources"
                        echo "      url: ${MANAGE_URL}"
                        echo "    - title: IaCM Workspace"
                        echo "      url: ${WS_URL}"
                        echo "  annotations:"
                        echo "    idp-iacm/owner-email: \"${OWNER_EMAIL}\""
                        echo "    idp-iacm/ec2: \"${CREATE_EC2}\""
                        echo "    idp-iacm/s3: \"${CREATE_S3}\""
                        echo "  tags:"
                        echo "    - idp-iacm-infra"
                        [ "${CREATE_EC2}" = "true" ] && echo "    - ec2"
                        [ "${CREATE_S3}" = "true" ] && echo "    - s3"
                      } > /tmp/entity.yaml

                      echo "----- catalog entity yaml -----"
                      cat /tmp/entity.yaml
                      jq -Rs '{yaml: .}' /tmp/entity.yaml > /tmp/entity_body.json

                      ecode=$(curl -s -o /tmp/entity_resp.json -w "%{http_code}" -X PUT \
                        -H "x-api-key: ${HARNESS_API_KEY}" \
                        -H "Harness-Account: ${ACCT}" \
                        -H "Content-Type: application/json" \
                        "${BASE}/account.default.IDP_POC/component/${ID}?orgIdentifier=default&projectIdentifier=IDP_POC" \
                        -d @/tmp/entity_body.json)
                      echo "Catalog upsert (PUT) status: ${ecode}"
                      cat /tmp/entity_resp.json || true
                      echo ""
                      echo "Catalog registration step complete (non-blocking)."
                      exit 0
        tags: {}
