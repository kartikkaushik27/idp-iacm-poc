pipeline:
  name: IDP IaCM Provision
  identifier: provision_infra
  projectIdentifier: IDP_POC
  orgIdentifier: default
  tags: {}
  variables:
    - name: workspace_id
      type: String
      description: Deterministic per-requester workspace id, supplied by IDP
      required: true
      value: <+input>
    - name: requester_email
      type: String
      description: Email of the requesting developer
      required: true
      value: <+input>
    - name: requester_name
      type: String
      description: Display name of the requester
      required: false
      value: <+input>
    - name: resource_type
      type: String
      description: ec2 or s3
      required: true
      value: <+input>
  stages:
    - stage:
        name: Bootstrap Workspace
        identifier: bootstrap
        description: Create the requester's IaCM workspace if it does not already exist
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: Http
                  name: Check Workspace
                  identifier: check_ws
                  timeout: 1m
                  spec:
                    url: https://app.harness.io/iacm/api/orgs/default/projects/IDP_POC/workspaces/<+pipeline.variables.workspace_id>?accountIdentifier=<+account.identifier>
                    method: GET
                    headers:
                      - key: x-api-key
                        value: <+secrets.getValue("harness_api_key")>
                    # No assertion: a 404 (workspace missing) must NOT fail the step.
              - step:
                  type: Http
                  name: Create Workspace
                  identifier: create_ws
                  timeout: 2m
                  spec:
                    url: https://app.harness.io/iacm/api/orgs/default/projects/IDP_POC/workspaces?accountIdentifier=<+account.identifier>
                    method: POST
                    headers:
                      - key: x-api-key
                        value: <+secrets.getValue("harness_api_key")>
                      - key: Content-Type
                        value: application/json
                    requestBody: |-
                      {
                        "identifier": "<+pipeline.variables.workspace_id>",
                        "name": "<+pipeline.variables.workspace_id>",
                        "provisioner": "terraform",
                        "provisioner_version": "1.5.7",
                        "provider_connector": "aws_connector",
                        "repository_connector": "github_connector",
                        "repository": "idp-iacm-poc",
                        "repository_branch": "main",
                        "repository_path": ".",
                        "cost_estimation_enabled": false,
                        "terraform_variables": {
                          "resource_type": {"key": "resource_type", "value": "<+pipeline.variables.resource_type>", "value_type": "string"},
                          "owner_email": {"key": "owner_email", "value": "<+pipeline.variables.requester_email>", "value_type": "string"},
                          "owner_name": {"key": "owner_name", "value": "<+pipeline.variables.requester_name>", "value_type": "string"}
                        }
                      }
                    assertion: <+httpResponseCode> == 200 || <+httpResponseCode> == 201
                  when:
                    stageStatus: Success
                    # Only create when the workspace does not already exist (reuse on return).
                    condition: <+pipeline.stages.bootstrap.spec.execution.steps.check_ws.output.httpResponseCode> != 200
        tags: {}
    - stage:
        name: Provision
        identifier: provision
        description: Run Terraform init/plan/apply against the workspace
        type: IACM
        spec:
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          workspace: <+pipeline.variables.workspace_id>
          execution:
            steps:
              - step:
                  type: IACMTerraformPlugin
                  name: init
                  identifier: init
                  timeout: 10m
                  spec:
                    command: init
              - step:
                  type: IACMTerraformPlugin
                  name: plan
                  identifier: plan
                  timeout: 10m
                  spec:
                    command: plan
              - step:
                  type: IACMTerraformPlugin
                  name: apply
                  identifier: apply
                  timeout: 30m
                  spec:
                    command: apply
        tags: {}
    - stage:
        name: Summary
        identifier: summary
        description: Fetch final workspace status (native HTTP, no shell)
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: Http
                  name: Summary
                  identifier: print_summary
                  timeout: 2m
                  spec:
                    url: https://app.harness.io/iacm/api/orgs/default/projects/IDP_POC/workspaces/<+pipeline.variables.workspace_id>?accountIdentifier=<+account.identifier>
                    method: GET
                    headers:
                      - key: x-api-key
                        value: <+secrets.getValue("harness_api_key")>
        tags: {}
