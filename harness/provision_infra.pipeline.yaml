pipeline:
  name: IDP IaCM Provision
  identifier: provision_infra
  projectIdentifier: IDP_POC
  orgIdentifier: default
  tags: {}
  variables:
    - name: workspace_id
      type: String
      description: Per-requester infra workspace id (<email>_infra), supplied by IDP
      required: true
      value: <+input>
    - name: requester_email
      type: String
      description: Email of the requesting developer
      required: true
      value: <+input>
    - name: requester_name
      type: String
      description: Display name of the requester
      required: false
      value: <+input>
    - name: create_ec2
      type: String
      description: "true to provision an EC2 instance, false to remove it"
      required: true
      value: <+input>
    - name: create_s3
      type: String
      description: "true to provision an S3 bucket, false to remove it"
      required: true
      value: <+input>
  stages:
    - stage:
        name: Bootstrap Workspace
        identifier: bootstrap
        description: Create the requester's IaCM workspace if it does not already exist (create-or-reuse). Runs on Harness Cloud, no delegate.
        type: CI
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Ensure Workspace
                  identifier: ensure_ws
                  timeout: 5m
                  spec:
                    shell: Sh
                    envVariables:
                      HARNESS_API_KEY: <+secrets.getValue("harness_api_key")>
                      ACCOUNT_ID: <+account.identifier>
                      WORKSPACE_ID: <+pipeline.variables.workspace_id>
                      CREATE_EC2: <+pipeline.variables.create_ec2>
                      CREATE_S3: <+pipeline.variables.create_s3>
                      OWNER_EMAIL: <+pipeline.variables.requester_email>
                      OWNER_NAME: <+pipeline.variables.requester_name>
                    command: |-
                      set -eu
                      BASE="https://app.harness.io/iacm/api/orgs/default/projects/IDP_POC/workspaces"

                      # Shared workspace body. AWS_SESSION_TOKEN is injected as a secret env var
                      # because the requester uses STS temporary credentials (the AWS connector
                      # only supplies the access key + secret, not the session token).
                      cat > /tmp/body.json <<JSON
                      {
                        "identifier": "${WORKSPACE_ID}",
                        "name": "${WORKSPACE_ID}",
                        "provisioner": "terraform",
                        "provisioner_version": "1.5.7",
                        "provider_connector": "aws_connector",
                        "repository_connector": "github_connector",
                        "repository": "idp-iacm-poc",
                        "repository_branch": "main",
                        "repository_path": ".",
                        "cost_estimation_enabled": false,
                        "environment_variables": {
                          "AWS_SESSION_TOKEN": {"key": "AWS_SESSION_TOKEN", "value": "AWS_SESSION_TOKEN", "value_type": "secret"}
                        },
                        "terraform_variables": {
                          "create_ec2": {"key": "create_ec2", "value": "${CREATE_EC2}", "value_type": "string"},
                          "create_s3": {"key": "create_s3", "value": "${CREATE_S3}", "value_type": "string"},
                          "owner_email": {"key": "owner_email", "value": "${OWNER_EMAIL}", "value_type": "string"},
                          "owner_name": {"key": "owner_name", "value": "${OWNER_NAME}", "value_type": "string"}
                        }
                      }
                      JSON

                      code=$(curl -s -o /tmp/ws.json -w "%{http_code}" \
                        -H "x-api-key: ${HARNESS_API_KEY}" \
                        "${BASE}/${WORKSPACE_ID}?accountIdentifier=${ACCOUNT_ID}")
                      echo "GET workspace status: ${code}"

                      if [ "${code}" = "200" ]; then
                        echo "Workspace ${WORKSPACE_ID} exists - updating (PUT) to keep vars/session token current..."
                        rcode=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X PUT \
                          -H "x-api-key: ${HARNESS_API_KEY}" \
                          -H "Content-Type: application/json" \
                          "${BASE}/${WORKSPACE_ID}?accountIdentifier=${ACCOUNT_ID}" \
                          -d @/tmp/body.json)
                      else
                        echo "Creating workspace ${WORKSPACE_ID}..."
                        rcode=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
                          -H "x-api-key: ${HARNESS_API_KEY}" \
                          -H "Content-Type: application/json" \
                          "${BASE}?accountIdentifier=${ACCOUNT_ID}" \
                          -d @/tmp/body.json)
                      fi
                      echo "Write workspace status: ${rcode}"
                      cat /tmp/resp.json || true
                      echo ""

                      if [ "${rcode}" != "200" ] && [ "${rcode}" != "201" ]; then
                        echo "Workspace write failed (HTTP ${rcode})"
                        exit 1
                      fi
                      echo "Workspace ${WORKSPACE_ID} ready."
        tags: {}
    - stage:
        name: Provision
        identifier: provision
        description: Run Terraform init/plan/apply against the workspace
        type: IACM
        spec:
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          workspace: <+pipeline.variables.workspace_id>
          execution:
            steps:
              - step:
                  type: IACMTerraformPlugin
                  name: init
                  identifier: init
                  timeout: 10m
                  spec:
                    command: init
              - step:
                  type: IACMTerraformPlugin
                  name: plan
                  identifier: plan
                  timeout: 10m
                  spec:
                    command: plan
              - step:
                  type: IACMTerraformPlugin
                  name: apply
                  identifier: apply
                  timeout: 30m
                  spec:
                    command: apply
        tags: {}
    - stage:
        name: Summary
        identifier: summary
        description: Fetch final workspace status. Runs on Harness Cloud, no delegate.
        type: CI
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Workspace Status
                  identifier: print_summary
                  timeout: 2m
                  spec:
                    shell: Sh
                    envVariables:
                      HARNESS_API_KEY: <+secrets.getValue("harness_api_key")>
                      ACCOUNT_ID: <+account.identifier>
                      WORKSPACE_ID: <+pipeline.variables.workspace_id>
                    command: |-
                      set -eu
                      BASE="https://app.harness.io/iacm/api/orgs/default/projects/IDP_POC/workspaces"
                      echo "Final status for workspace ${WORKSPACE_ID}:"
                      curl -s -H "x-api-key: ${HARNESS_API_KEY}" \
                        "${BASE}/${WORKSPACE_ID}?accountIdentifier=${ACCOUNT_ID}"
                      echo ""
              - step:
                  type: Run
                  name: Register Catalog Entity
                  identifier: register_catalog
                  timeout: 3m
                  spec:
                    shell: Sh
                    envVariables:
                      HARNESS_API_KEY: <+secrets.getValue("harness_api_key")>
                      ACCOUNT_ID: <+account.identifier>
                      WORKSPACE_ID: <+pipeline.variables.workspace_id>
                      CREATE_EC2: <+pipeline.variables.create_ec2>
                      CREATE_S3: <+pipeline.variables.create_s3>
                      OWNER_EMAIL: <+pipeline.variables.requester_email>
                      OWNER_NAME: <+pipeline.variables.requester_name>
                    command: |-
                      # Non-blocking: catalog upkeep must never fail provisioning.
                      python3 - <<'PY' || echo "Catalog step skipped (python3 unavailable) - non-blocking"
                      import os, sys, json, urllib.request, urllib.error, urllib.parse

                      acct  = os.environ["ACCOUNT_ID"]
                      api   = os.environ["HARNESS_API_KEY"]
                      wid   = os.environ["WORKSPACE_ID"]
                      email = os.environ.get("OWNER_EMAIL", "")
                      name  = os.environ.get("OWNER_NAME", "")
                      ec2   = os.environ.get("CREATE_EC2", "false").strip().lower() == "true"
                      s3    = os.environ.get("CREATE_S3", "false").strip().lower() == "true"

                      form = {"email": email, "name": name, "createEc2": ec2, "createS3": s3}
                      enc  = urllib.parse.quote(json.dumps(form))
                      manage_url = "https://app.harness.io/ng/account/%s/module/idp/create/templates/default/order_infrastructure?formData=%s" % (acct, enc)
                      ws_url     = "https://app.harness.io/ng/account/%s/module/iacm/orgs/default/projects/IDP_POC/workspaces/%s" % (acct, wid)

                      tags = ["idp-iacm-infra"]
                      if ec2: tags.append("ec2")
                      if s3:  tags.append("s3")
                      tag_lines = "".join("\n    - %s" % t for t in tags)

                      entity_yaml = (
                          "apiVersion: harness.io/v1\n"
                          "kind: Component\n"
                          "identifier: %s\n" % wid +
                          "name: %s\n" % wid +
                          "orgIdentifier: default\n"
                          "projectIdentifier: IDP_POC\n"
                          "type: infrastructure\n"
                          "owner: group:account/platform_team\n"
                          "spec:\n"
                          "  lifecycle: production\n"
                          "metadata:\n"
                          "  description: AWS infra managed via IDP for %s\n" % email +
                          "  links:\n"
                          "    - title: Manage / Edit Resources\n"
                          "      url: %s\n" % manage_url +
                          "    - title: IaCM Workspace\n"
                          "      url: %s\n" % ws_url +
                          "  annotations:\n"
                          "    idp-iacm/owner-email: \"%s\"\n" % email +
                          "    idp-iacm/ec2: \"%s\"\n" % str(ec2).lower() +
                          "    idp-iacm/s3: \"%s\"\n" % str(s3).lower() +
                          "  tags:%s\n" % tag_lines
                      )

                      print("----- catalog entity yaml -----")
                      print(entity_yaml)

                      body = json.dumps({"yaml": entity_yaml}).encode("utf-8")
                      headers = {"x-api-key": api, "Harness-Account": acct, "Content-Type": "application/json"}

                      def send(method, url):
                          req = urllib.request.Request(url, data=body, method=method, headers=headers)
                          try:
                              with urllib.request.urlopen(req) as r:
                                  return r.status, r.read().decode("utf-8")
                          except urllib.error.HTTPError as e:
                              return e.code, e.read().decode("utf-8")
                          except Exception as e:
                              return 0, repr(e)

                      create_url = "https://app.harness.io/v1/entities?orgIdentifier=default&projectIdentifier=IDP_POC"
                      update_url = ("https://app.harness.io/v1/entities/account.default.IDP_POC/component/%s"
                                    "?orgIdentifier=default&projectIdentifier=IDP_POC" % wid)

                      # Create-or-update: POST creates the project-scoped component; if it already
                      # exists, fall back to PUT to refresh tags/links/annotations.
                      code, resp = send("POST", create_url)
                      print("POST create status:", code)
                      print(resp)
                      if code not in (200, 201):
                          print("Component likely exists - updating via PUT...")
                          code, resp = send("PUT", update_url)
                          print("PUT update status:", code)
                          print(resp)

                      if code in (200, 201):
                          print("Catalog entity upserted OK.")
                      else:
                          print("Catalog upsert failed (non-blocking) - provisioning unaffected.")
                      sys.exit(0)
                      PY
        tags: {}
