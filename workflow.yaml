apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: order-infrastructure
  title: Order Infrastructure
  description: Manage your AWS infrastructure (EC2 and/or S3) in a single per-user IaCM workspace
  tags:
    - aws
    - iacm
    - self-service
spec:
  owner: platform-team
  type: environment
  parameters:
    - title: Request Details
      required:
        - email
      properties:
        email:
          title: Your Email
          type: string
          description: Used to tag resources and to name your dedicated workspace (<email>_infra)
        name:
          title: Your Name
          type: string
          description: Display name (used as a tag)
        createEc2:
          title: EC2 Instance
          type: boolean
          default: false
          description: Check to have an EC2 instance. Uncheck and re-run to remove it.
        createS3:
          title: S3 Bucket
          type: boolean
          default: false
          description: Check to have an S3 bucket. Uncheck and re-run to remove it.
        token:
          title: Harness Token
          type: string
          ui:widget: password
          ui:field: HarnessAuthToken
  steps:
    - id: trigger
      name: Provision Infrastructure
      action: trigger:harness-custom-pipeline
      input:
        url: "https://app.harness.io/ng/account/aBh2PBI0T1CYMmA6iQFosg/module/idp/orgs/default/projects/IDP_POC/pipelines/provision_infra/pipeline-studio/?storeType=INLINE"
        inputset:
          workspace_id: ${{ parameters.email | replace("@", "_") | replace(".", "_") }}_infra
          requester_email: ${{ parameters.email }}
          requester_name: ${{ parameters.name }}
          create_ec2: "${{ parameters.createEc2 }}"
          create_s3: "${{ parameters.createS3 }}"
        apikey: ${{ parameters.token }}
  output:
    links:
      - title: Pipeline Execution
        url: ${{ steps.trigger.output.PipelineUrl }}
